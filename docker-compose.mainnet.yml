name: scan-mainnet

services:
  sync-pos:
    build:
      context: .
      dockerfile: sync.Dockerfile
    env_file: .env.mainnet
    command: ["sync", "pos", "-n", "main"]
    restart: unless-stopped

  sync-pow:
    build:
      context: .
      dockerfile: sync.Dockerfile
    env_file: .env.mainnet
    command: ["sync", "pow", "-n", "main"]
    restart: unless-stopped

  sync-nft:
    build:
      context: .
      dockerfile: sync.Dockerfile
    env_file: .env.mainnet
    command: ["sync", "nft", "-n", "main"]
    restart: unless-stopped

  sync-metric:
    build:
      context: .
      dockerfile: sync.Dockerfile
    env_file: .env.mainnet
    command: ["sync", "metric", "-n", "main"]
    restart: unless-stopped

  sync-scriptengine:
    build:
      context: .
      dockerfile: sync.Dockerfile
    env_file: .env.mainnet
    command: ["sync", "scriptengine", "-n", "main"]
    restart: unless-stopped
